<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InstantFix</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .login {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 300px;
      margin: 100px auto;
    }

    input, select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    header {
      padding: 10px;
      background: #111827;
      display: flex;
      justify-content: space-between;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    .card {
      background: #1f2937;
      padding: 10px;
      border-radius: 8px;
    }

    .job {
      background: #111827;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="loginPage" class="login">
  <h2>InstantFix Login</h2>
  <input id="username" placeholder="Username" />
  <select id="role">
    <option value="client">Client</option>
    <option value="helper">Helper</option>
  </select>
  <button onclick="join()">Enter</button>
</div>

<div id="app" style="display:none;">
  <header>
    <div>InstantFix</div>
    <div id="me"></div>
  </header>

  <div class="container">

    <div class="card">
      <h3>Create Job</h3>
      <input id="title" placeholder="Title" />
      <input id="description" placeholder="Description" />
      <input id="location" placeholder="Location" />
      <button onclick="createJob()">Post</button>
    </div>

    <div class="card">
      <h3>Jobs</h3>
      <div id="jobs"></div>
    </div>

  </div>
</div>

<script>
  const socket = io("http://localhost:3000");

  let currentUser = null;
  const jobsDiv = document.getElementById("jobs");

  function join() {
    const username = document.getElementById("username").value;
    const role = document.getElementById("role").value;

    socket.emit("user:join", { username, role });

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
  }

  socket.on("user:ready", (user) => {
    currentUser = user;
    document.getElementById("me").innerText =
      user.username + " (" + user.role + ")";
  });

  socket.on("jobs:init", renderJobs);
  socket.on("job:new", addJob);
  socket.on("job:update", updateJob);

  function createJob() {
    socket.emit("job:create", {
      title: title.value,
      description: description.value,
      location: location.value
    });
  }

  function renderJobs(jobs) {
    jobsDiv.innerHTML = "";
    jobs.forEach(addJob);
  }

  function addJob(job) {
    const div = document.createElement("div");
    div.className = "job";
    div.id = job.id;

    div.innerHTML = `
      <b>${job.title}</b>
      <p>${job.description}</p>
      <small>${job.location}</small>
      <p>Status: ${job.status}</p>
      <button onclick="acceptJob('${job.id}')">Accept</button>
      <button onclick="doneJob('${job.id}')">Done</button>
    `;

    jobsDiv.appendChild(div);
  }

  function updateJob(job) {
    const old = document.getElementById(job.id);
    if (old) old.remove();
    addJob(job);
  }

  function acceptJob(id) {
    socket.emit("job:accept", { jobId: id });
  }

  function doneJob(id) {
    socket.emit("job:done", { jobId: id });
  }
</script>

</body>
</html>
