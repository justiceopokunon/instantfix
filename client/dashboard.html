<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InstantFix Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  text-align: center;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.section {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: black;
  color: white;
  border: none;
}

.job {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>InstantFix Dashboard</h1>

<button onclick="logout()" style="background:red; margin-bottom:10px;">
Logout
</button>

<div class="stats">
  <div class="card"><p>Total</p><h2 id="total">0</h2></div>
  <div class="card"><p>Open</p><h2 id="open">0</h2></div>
  <div class="card"><p>Accepted</p><h2 id="accepted">0</h2></div>
  <div class="card"><p>Done</p><h2 id="done">0</h2></div>
</div>

<div class="section" id="createSection">
  <h2>Create Job</h2>

  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="location" placeholder="Location">

  <button onclick="createJob()">Post Job</button>
</div>

<div class="section">
  <h2>Jobs</h2>
  <div id="jobs"></div>
</div>

</div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>
const API = "http://localhost:3000";

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

function getTokenRole(tokenValue) {
  try {
    const payload = tokenValue.split(".")[1];
    const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
    const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
    return JSON.parse(atob(padded)).role;
  } catch (err) {
    return null;
  }
}

const tokenRole = token ? getTokenRole(token) : null;
const activeRole = tokenRole || role;

if (!token) window.location.href = "auth.html";
if (activeRole !== "client") window.location.href = "helper.html";

const socket = io(API, {
  auth: { token }
});

const jobsDiv = document.getElementById("jobs");

socket.on("jobs:init", renderAll);
socket.on("job:new", addJob);
socket.on("job:update", updateJob);

function createJob() {
  socket.emit("job:create", {
    title: title.value,
    description: desc.value,
    location: location.value
  });

  title.value = "";
  desc.value = "";
  location.value = "";
}

function renderAll(jobs) {
  jobsDiv.innerHTML = "";

  updateStats(jobs);

  jobs.forEach(addJob);
}

function addJob(job) {
  const div = document.createElement("div");
  div.className = "job";
  div.id = job.id;

  div.innerHTML = `
    <h3>${job.title}</h3>
    <p>${job.description}</p>
    <small>${job.location}</small>
    <p>Status: ${job.status}</p>
  `;

  jobsDiv.appendChild(div);
}

function updateJob(job) {
  const el = document.getElementById(job.id);
  if (el) {
    el.innerHTML = `
      <h3>${job.title}</h3>
      <p>${job.description}</p>
      <small>${job.location}</small>
      <p>Status: ${job.status}</p>
    `;
  }
}

function updateStats(jobs) {
  total.textContent = jobs.length;
  open.textContent = jobs.filter(j => j.status === "open").length;
  accepted.textContent = jobs.filter(j => j.status === "accepted").length;
  done.textContent = jobs.filter(j => j.status === "done").length;
}

function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}
</script>

</body>
</html>
